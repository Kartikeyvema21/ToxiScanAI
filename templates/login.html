<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ToxiScan AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-radiation-alt"></i>
                <h1>ToxiScan <span>AI</span></h1>
                <p>Toxicity Detection System</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Login</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="regUsername" placeholder="Choose username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email (optional)</label>
                    <input type="email" id="regEmail" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="regPassword" placeholder="Choose password" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check"></i> Confirm Password</label>
                    <input type="password" id="regConfirm" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn-login" id="registerBtn">Register</button>
            </form>

            <div id="message" class="message"></div>

            <div class="demo-accounts">
                <p><i class="fas fa-flask"></i> Demo Accounts</p>
                <div class="demo-buttons">
                    <button class="demo-btn" onclick="fillDemo('admin', 'admin123')">admin / admin123</button>
                    <button class="demo-btn" onclick="fillDemo('demo', 'demo123')">demo / demo123</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
